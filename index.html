<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoExchange Pro - Admin & Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-light: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Ticker Slider */
        .ticker-container {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            padding: 12px 0;
            overflow: hidden;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .ticker-wrap {
            display: flex;
            animation: ticker 35s linear infinite;
            white-space: nowrap;
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            padding: 0 25px;
            font-size: 14px;
            font-weight: 600;
        }

        .ticker-item .coin {
            color: var(--primary);
            margin-right: 8px;
        }

        .ticker-item .price {
            color: var(--success);
            margin-left: 5px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 20px 20px;
            position: relative;
        }
        .header h1 {
            font-size: 2rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* History Button */
        .history-btn {
            position: fixed;
            top: 80px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 500;
            font-weight: 600;
            transition: all 0.3s;
        }
        .history-btn:hover {
            background: var(--primary);
            color: white;
        }

        .admin-toggle {
            position: fixed;
            top: 80px;
            left: 20px;
            background: var(--bg-card);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 500;
            font-weight: 600;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 968px) {
            .container { grid-template-columns: 1fr; }
        }

        /* Exchange Panel */
        .exchange-panel {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(99,102,241,0.2);
            box-shadow: var(--shadow);
        }

        .exchange-panel h2, .rates-panel h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .currency-select, .amount-input, .wallet-input {
            margin-bottom: 20px;
        }
        .currency-select label, .amount-input label, .wallet-input label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .select-wrapper, .input-wrapper {
            background: var(--bg-light);
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }
        .select-wrapper:focus-within, .input-wrapper:focus-within {
            border-color: var(--primary);
        }
        .select-wrapper select {
            width: 100%;
            padding: 15px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
            outline: none;
        }
        .input-wrapper {
            display: flex;
            align-items: center;
        }
        .input-wrapper input {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            outline: none;
        }
        .input-currency {
            padding: 10px 15px;
            background: rgba(99,102,241,0.2);
            border-radius: 8px;
            margin-right: 10px;
            font-weight: 600;
        }
        .wallet-input input {
            width: 100%;
            padding: 15px;
            background: var(--bg-light);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
        }
        .swap-btn {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .swap-btn button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            background: var(--bg-card);
            color: var(--primary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .result-display {
            background: var(--gradient-1);
            border-radius: 16px;
            padding: 25px;
            margin: 20px 0;
            text-align: center;
        }
        .result-amount {
            font-size: 2rem;
            font-weight: 700;
        }
        .exchange-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: var(--gradient-1);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
        }

        /* Rates Panel - Clickable for admin */
        .rates-panel {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(99,102,241,0.2);
            height: fit-content;
        }
        .rate-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        .rate-card:hover {
            background: rgba(99,102,241,0.2);
            transform: translateX(5px);
            border-color: var(--primary);
        }
        .rate-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .rate-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .icon-btc { background: #f7931a; }
        .icon-eth { background: #627eea; }
        .icon-usdt { background: #26a17b; }
        .icon-ton { background: #0088cc; }
        .icon-trx { background: #ff060a; }
        .icon-doge { background: #c2a633; }
        .icon-usdc { background: #2775ca; }
        .icon-uzs { background: #1eb53a; }
        .icon-usd { background: #85bb65; }
        .icon-rub { background: #0033a0; }
        .rate-price {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--success);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }
        .price-input-modal input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: var(--bg-light);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.2rem;
        }
        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }
        .save-btn { background: var(--success); color: white; }
        .cancel-btn { background: var(--danger); color: white; }

        /* History Modal */
        .history-modal {
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }
        .history-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .status-pending { background: rgba(245,158,11,0.2); color: var(--warning); }
        .status-paid { background: rgba(16,185,129,0.2); color: var(--success); }
        .status-completed { background: rgba(99,102,241,0.2); color: var(--primary); }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px 20px;
            transform: translateX(400px);
            transition: all 0.3s;
            z-index: 3000;
            border-left: 4px solid var(--success);
        }
        .toast.active { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-wrap" id="tickerWrap"></div>
    </div>

    <button class="admin-toggle" onclick="toggleAdminMode()">👑 Admin</button>
    <button class="history-btn" onclick="openHistoryModal()">📜 Tarix</button>

    <div class="header">
        <h1>💱 CryptoExchange Pro</h1>
        <p>Valyuta almashtirish xizmati</p>
    </div>

    <div class="container">
        <div class="exchange-panel">
            <h2>💱 Almashtirish</h2>
            <div class="currency-select">
                <label>Siz berasiz:</label>
                <div class="select-wrapper">
                    <select id="giveCurrency" onchange="updateCalculation()">
                        <option value="UZS">🇺🇿 UZS - So'm</option>
                        <option value="USD">🇺🇸 USD - Dollar</option>
                        <option value="RUB">🇷🇺 RUB - Ruble</option>
                        <option value="USDT">₮ USDT - Tether</option>
                        <option value="BTC">₿ Bitcoin</option>
                        <option value="ETH">Ξ Ethereum</option>
                        <option value="TON">🌐 TON</option>
                        <option value="TRX">📱 TRX</option>
                        <option value="DOGE">🐕 DOGE</option>
                        <option value="USDC">💰 USDC</option>
                    </select>
                </div>
            </div>
            <div class="amount-input">
                <label>Miqdor:</label>
                <div class="input-wrapper">
                    <input type="number" id="giveAmount" placeholder="0.00" oninput="updateCalculation()">
                    <span class="input-currency" id="giveSymbol">UZS</span>
                </div>
            </div>
            <div class="swap-btn">
                <button onclick="swapCurrencies()">⇅</button>
            </div>
            <div class="currency-select">
                <label>Siz olasiz:</label>
                <div class="select-wrapper">
                    <select id="getCurrency" onchange="updateCalculation()">
                        <option value="USDT">₮ USDT</option>
                        <option value="BTC">₿ BTC</option>
                        <option value="ETH">Ξ ETH</option>
                        <option value="TON">🌐 TON</option>
                        <option value="TRX">📱 TRX</option>
                        <option value="DOGE">🐕 DOGE</option>
                        <option value="USDC">💰 USDC</option>
                        <option value="UZS">🇺🇿 UZS</option>
                        <option value="USD">🇺🇸 USD</option>
                        <option value="RUB">🇷🇺 RUB</option>
                    </select>
                </div>
            </div>
            <div class="result-display">
                <div class="result-amount" id="resultAmount">0.00</div>
                <div id="resultRate" style="font-size: 0.85rem;">Kurs: -</div>
            </div>
            <div class="wallet-input">
                <label>💳 Qabul qiluvchi hamyoni:</label>
                <input type="text" id="walletAddress" placeholder="Wallet address yoki karta raqami">
            </div>
            <button class="exchange-btn" onclick="openExchangeModal()">🚀 Almashtirish</button>
        </div>

        <div class="rates-panel">
            <h2>📊 Valyuta kurslari (admin o'rnatadi)</h2>
            <div id="ratesList"></div>
            <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 15px;">* Admin sifatida valyuta ustiga bosing va narx kiriting</p>
        </div>
    </div>

    <!-- Price Edit Modal -->
    <div class="modal-overlay" id="priceModal">
        <div class="modal">
            <h3>💰 Narxni o'rnatish</h3>
            <p id="priceCurrencyName"></p>
            <div class="price-input-modal">
                <input type="number" id="priceValue" step="any" placeholder="USD ga nisbatan kurs">
            </div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="savePrice()">💾 Saqlash</button>
                <button class="cancel-btn" onclick="closePriceModal()">Bekor</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal-overlay" id="historyModal">
        <div class="modal history-modal">
            <h3>📜 Tranzaksiya tarixi</h3>
            <div id="historyList"></div>
            <button class="cancel-btn" onclick="closeHistoryModal()" style="margin-top: 20px; width: 100%;">Yopish</button>
        </div>
    </div>

    <!-- Exchange Modal -->
    <div class="modal-overlay" id="exchangeModal">
        <div class="modal">
            <h3>✅ Zakazni tasdiqlash</h3>
            <div id="exchangeDetails" style="margin: 20px 0;"></div>
            <div class="timer-display" id="timer" style="text-align: center; font-size: 2rem; font-family: monospace;">10:00</div>
            <div class="upload-area" style="border: 2px dashed var(--bg-light); border-radius: 12px; padding: 20px; text-align: center; margin: 20px 0; cursor: pointer;" onclick="document.getElementById('receiptFile').click()">
                📁 Kvitansiya yuklash
                <input type="file" id="receiptFile" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFileUpload(this)">
            </div>
            <div id="uploadedFileInfo" style="display: none; background: rgba(16,185,129,0.1); padding: 10px; border-radius: 8px;"></div>
            <div class="modal-buttons">
                <button class="save-btn" onclick="confirmPayment()">✅ To'ladim</button>
                <button class="cancel-btn" onclick="cancelOrder()">❌ Bekor</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">✅ Muvaffaqiyatli</div>

    <script>
        // ============ ALL CURRENCIES ============
        const allCurrencies = ['BTC', 'ETH', 'USDT', 'TON', 'TRX', 'DOGE', 'USDC', 'UZS', 'USD', 'RUB'];
        const currencyNames = {
            BTC: 'Bitcoin', ETH: 'Ethereum', USDT: 'Tether', TON: 'TON Coin', 
            TRX: 'Tron', DOGE: 'Dogecoin', USDC: 'USD Coin', UZS: 'So\'m', USD: 'Dollar', RUB: 'Ruble'
        };
        const currencyIcons = {
            BTC: '₿', ETH: 'Ξ', USDT: '₮', TON: '🌐', TRX: '📱', DOGE: '🐕', USDC: '💰', UZS: '🇺🇿', USD: '🇺🇸', RUB: '🇷🇺'
        };

        // ============ RATES (Admin can change) ============
        let rates = JSON.parse(localStorage.getItem('exchangeRates')) || {
            BTC: 0.000015, ETH: 0.00028, USDT: 1, TON: 0.15, TRX: 6.5, DOGE: 7.2, USDC: 1, UZS: 12650, USD: 1, RUB: 92.5
        };

        let currentOrder = null;
        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let selectedCurrencyForPrice = null;
        let uploadedReceipt = null;
        let timerInterval = null;

        // Save rates
        function saveRates() {
            localStorage.setItem('exchangeRates', JSON.stringify(rates));
            updateTicker();
            renderRatesList();
            updateCalculation();
        }

        // Ticker
        function updateTicker() {
            const wrap = document.getElementById('tickerWrap');
            let html = '';
            allCurrencies.forEach(curr => {
                const price = (1 / rates[curr]).toFixed(curr === 'BTC' || curr === 'ETH' ? 8 : 2);
                html += `<div class="ticker-item">
                    <span class="coin">${currencyIcons[curr]} ${curr}</span>
                    <span class="price">$${price}</span>
                </div>`;
            });
            wrap.innerHTML = html + html;
        }

        // Render rates list (clickable for admin)
        function renderRatesList() {
            const container = document.getElementById('ratesList');
            container.innerHTML = allCurrencies.map(curr => {
                const price = (1 / rates[curr]).toFixed(curr === 'BTC' || curr === 'ETH' ? 8 : 2);
                return `
                    <div class="rate-card" onclick="openPriceModal('${curr}')">
                        <div class="rate-info">
                            <div class="rate-icon icon-${curr.toLowerCase()}">${currencyIcons[curr]}</div>
                            <div>
                                <div class="rate-name">${curr}</div>
                                <div class="rate-fullname">${currencyNames[curr]}</div>
                            </div>
                        </div>
                        <div class="rate-value">
                            <div class="rate-price">$${price}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Open price modal (admin only)
        let isAdminMode = false;
        function toggleAdminMode() {
            isAdminMode = !isAdminMode;
            showToast(isAdminMode ? '👑 Admin rejimi yoqildi. Valyutalarga bossangiz narx o\'rnata olasiz' : '👤 Mijoz rejimi');
        }

        function openPriceModal(currency) {
            if (!isAdminMode) {
                showToast('⚠️ Admin rejimiga kiring (chapdagi Admin tugmasi)');
                return;
            }
            selectedCurrencyForPrice = currency;
            document.getElementById('priceCurrencyName').innerHTML = `<strong>${currency} (${currencyNames[currency]})</strong><br>USD ga nisbatan kurs:`;
            document.getElementById('priceValue').value = rates[currency];
            document.getElementById('priceModal').classList.add('active');
        }

        function savePrice() {
            const newPrice = parseFloat(document.getElementById('priceValue').value);
            if (isNaN(newPrice) || newPrice <= 0) {
                showToast('❌ Noto\'g\'ri kurs');
                return;
            }
            rates[selectedCurrencyForPrice] = newPrice;
            saveRates();
            closePriceModal();
            showToast(`✅ ${selectedCurrencyForPrice} kursi yangilandi: ${newPrice}`);
        }

        function closePriceModal() {
            document.getElementById('priceModal').classList.remove('active');
        }

        // Calculation
        function updateCalculation() {
            const giveCurr = document.getElementById('giveCurrency').value;
            const getCurr = document.getElementById('getCurrency').value;
            let giveAmount = parseFloat(document.getElementById('giveAmount').value) || 0;
            
            document.getElementById('giveSymbol').innerText = giveCurr;
            
            const rate = rates[getCurr] / rates[giveCurr];
            const fee = 0.005;
            const getAmount = giveAmount * rate * (1 - fee);
            
            document.getElementById('resultAmount').innerHTML = getAmount.toFixed(getCurr === 'UZS' ? 0 : 6) + ' ' + getCurr;
            document.getElementById('resultRate').innerHTML = `1 ${giveCurr} = ${rate.toFixed(6)} ${getCurr} (komissiya 0.5%)`;
        }

        function swapCurrencies() {
            const give = document.getElementById('giveCurrency').value;
            const get = document.getElementById('getCurrency').value;
            document.getElementById('giveCurrency').value = get;
            document.getElementById('getCurrency').value = give;
            updateCalculation();
        }

        // Exchange Modal
        function openExchangeModal() {
            const giveAmount = parseFloat(document.getElementById('giveAmount').value);
            if (!giveAmount || giveAmount <= 0) { showToast('❌ Miqdor kiriting'); return; }
            const wallet = document.getElementById('walletAddress').value;
            if (!wallet.trim()) { showToast('❌ Hamyon kiriting'); return; }

            const orderId = 'ORD-' + Date.now();
            currentOrder = {
                id: orderId,
                giveCurrency: document.getElementById('giveCurrency').value,
                getCurrency: document.getElementById('getCurrency').value,
                giveAmount: giveAmount,
                getAmount: parseFloat(document.getElementById('resultAmount').innerText.split(' ')[0]),
                wallet: wallet,
                status: 'pending',
                createdAt: new Date().toISOString(),
                receiptData: null
            };

            document.getElementById('exchangeDetails').innerHTML = `
                <div><strong>Zakaz ID:</strong> ${orderId}</div>
                <div><strong>Siz berasiz:</strong> ${giveAmount} ${currentOrder.giveCurrency}</div>
                <div><strong>Siz olasiz:</strong> ${currentOrder.getAmount} ${currentOrder.getCurrency}</div>
                <div><strong>Hamyon:</strong> ${wallet}</div>
            `;
            document.getElementById('exchangeModal').classList.add('active');
            startTimer(600);
        }

        function startTimer(seconds) {
            let remaining = seconds;
            const timerDisplay = document.getElementById('timer');
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const mins = Math.floor(remaining / 60);
                const secs = remaining % 60;
                timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                if (remaining <= 0) {
                    clearInterval(timerInterval);
                    cancelOrder();
                }
                remaining--;
            }, 1000);
        }

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) { showToast('❌ Fayl 10MB dan katta'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedReceipt = e.target.result;
                if (currentOrder) currentOrder.receiptData = uploadedReceipt;
                document.getElementById('uploadedFileInfo').innerHTML = `✅ ${file.name} yuklandi`;
                document.getElementById('uploadedFileInfo').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function confirmPayment() {
            if (!uploadedReceipt && !currentOrder?.receiptData) {
                showToast('❌ Iltimos, kvitansiyani yuklang');
                return;
            }
            currentOrder.status = 'paid';
            currentOrder.paidAt = new Date().toISOString();
            orders.push(currentOrder);
            localStorage.setItem('orders', JSON.stringify(orders));
            clearInterval(timerInterval);
            document.getElementById('exchangeModal').classList.remove('active');
            uploadedReceipt = null;
            document.getElementById('uploadedFileInfo').style.display = 'none';
            document.getElementById('receiptFile').value = '';
            showToast('✅ To\'lov tasdiqlandi. Admin tekshiradi');
        }

        function cancelOrder() {
            if (currentOrder && currentOrder.receiptData) {
                currentOrder.status = 'cancelled';
                orders.push(currentOrder);
                localStorage.setItem('orders', JSON.stringify(orders));
            }
            clearInterval(timerInterval);
            document.getElementById('exchangeModal').classList.remove('active');
            showToast('❌ Zakaz bekor qilindi');
        }

        // History Modal
        function openHistoryModal() {
            const container = document.getElementById('historyList');
            if (orders.length === 0) {
                container.innerHTML = '<p style="text-align:center;">Tarix yo\'q</p>';
            } else {
                container.innerHTML = orders.slice().reverse().map(order => `
                    <div class="history-item">
                        <div><strong>${order.id}</strong> <span class="history-status status-${order.status}">${order.status}</span></div>
                        <div>Berish: ${order.giveAmount} ${order.giveCurrency}</div>
                        <div>Olish: ${order.getAmount} ${order.getCurrency}</div>
                        <div>Sana: ${new Date(order.createdAt).toLocaleString()}</div>
                        ${order.status === 'paid' ? '<div style="color: var(--warning);">⏳ Admin tasdiqlashini kuting</div>' : ''}
                        ${order.status === 'completed' ? '<div style="color: var(--success);">✅ Bajarilgan</div>' : ''}
                    </div>
                `).join('');
            }
            document.getElementById('historyModal').classList.add('active');
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').classList.remove('active');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 2500);
        }

        // Initial load
        document.addEventListener('DOMContentLoaded', () => {
            updateTicker();
            renderRatesList();
            updateCalculation();
        });
    </script>
</body>
</html>
