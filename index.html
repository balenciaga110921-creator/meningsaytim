<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Obmennik | USDT, BTC, TON</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 P2P Obmennik</h1>
        
        <!-- Balanslar paneli -->
        <div class="balance-panel">
            <h2>Mening aktivlarim</h2>
            <div class="balance-list">
                <div class="balance-item">🇺🇸 USDT: <span id="usdt-balance">1250.50</span></div>
                <div class="balance-item">₿ Bitcoin: <span id="btc-balance">0.047</span></div>
                <div class="balance-item">Ⓣ Toncoin: <span id="ton-balance">89.20</span></div>
                <div class="balance-item">🇺🇿 UZS: <span id="uzs-balance">5,200,000</span> so‘m</div>
            </div>
        </div>

        <!-- Obmen qilish formasi -->
        <div class="exchange-form">
            <h2>📌 Obmen qilish</h2>
            
            <div class="row">
                <label>Men beraman:</label>
                <select id="give-currency">
                    <option value="usdt">USDT</option>
                    <option value="btc">Bitcoin</option>
                    <option value="ton">Toncoin</option>
                    <option value="uzs">UZS (so‘m)</option>
                </select>
                <input type="number" id="give-amount" placeholder="Summa">
            </div>

            <div class="row">
                <label>Men olaman:</label>
                <select id="get-currency">
                    <option value="ton">Toncoin</option>
                    <option value="usdt">USDT</option>
                    <option value="btc">Bitcoin</option>
                    <option value="uzs">UZS (so‘m)</option>
                </select>
                <input type="text" id="get-amount" readonly placeholder="0">
            </div>

            <button id="exchange-btn">⚡ Hisoblash</button>
            <button id="submit-btn">📤 Obmen qilish</button>
        </div>

        <div id="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
