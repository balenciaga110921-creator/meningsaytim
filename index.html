<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoExchange Pro - Valyuta Almashtirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-light: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; }

        /* TICKER */
        .ticker-container {
            background: rgba(15,23,42,0.97);
            border-bottom: 1px solid rgba(99,102,241,0.3);
            padding: 12px 0; overflow: hidden;
            position: sticky; top: 0; z-index: 100;
        }
        .ticker-wrap { display: flex; animation: ticker 40s linear infinite; white-space: nowrap; }
        .ticker-item { display: inline-flex; align-items: center; padding: 0 28px; font-size: 14px; font-weight: 600; gap: 6px; }
        .ticker-coin { color: var(--primary); }
        .ticker-price { color: var(--success); }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        /* HEADER */
        .header { text-align: center; padding: 28px 20px 16px; }
        .header h1 { font-size: 2rem; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: var(--text-secondary); margin-top: 5px; }

        .history-btn {
            position: fixed; top: 75px; right: 18px;
            background: var(--bg-card); border: 1px solid var(--primary);
            color: var(--primary); padding: 9px 16px; border-radius: 25px;
            cursor: pointer; z-index: 500; font-weight: 600; font-size: 0.9rem;
            transition: all 0.3s;
        }
        .history-btn:hover { background: var(--primary); color: white; }

        /* MAIN GRID */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
        @media (max-width: 968px) { .container { grid-template-columns: 1fr; } }

        .panel {
            background: var(--bg-card); border-radius: 20px; padding: 28px;
            border: 1px solid rgba(99,102,241,0.2); box-shadow: var(--shadow);
        }
        .panel h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--primary); }

        /* FORM ELEMENTS */
        .field { margin-bottom: 18px; }
        .field label { display: block; margin-bottom: 7px; color: var(--text-secondary); font-size: 0.88rem; }
        .select-wrap, .input-wrap {
            background: var(--bg-light); border-radius: 12px;
            border: 2px solid transparent; transition: border-color 0.3s;
        }
        .select-wrap:focus-within, .input-wrap:focus-within { border-color: var(--primary); }
        .select-wrap select {
            width: 100%; padding: 14px; background: transparent;
            border: none; color: var(--text-primary); font-size: 1rem; cursor: pointer; outline: none;
        }
        .input-wrap { display: flex; align-items: center; }
        .input-wrap input {
            flex: 1; padding: 14px; background: transparent; border: none;
            color: var(--text-primary); font-size: 1.1rem; font-weight: 600; outline: none;
        }
        .input-sym { padding: 8px 12px; background: rgba(99,102,241,0.2); border-radius: 8px; margin-right: 10px; font-weight: 700; min-width: 52px; text-align: center; }
        .wallet-input { width: 100%; padding: 14px; background: var(--bg-light); border-radius: 12px; color: var(--text-primary); outline: none; border: 2px solid transparent; font-size: 0.95rem; transition: border-color 0.3s; }
        .wallet-input:focus { border-color: var(--primary); }

        .swap-row { display: flex; justify-content: center; margin: 14px 0; }
        .swap-btn {
            width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--primary);
            background: var(--bg-card); color: var(--primary); font-size: 1.4rem;
            cursor: pointer; transition: all 0.3s;
        }
        .swap-btn:hover { background: var(--primary); color: white; transform: rotate(180deg); }

        .result-box {
            background: var(--gradient-1); border-radius: 16px; padding: 22px;
            margin: 18px 0; text-align: center;
        }
        .result-amount { font-size: 2rem; font-weight: 700; }
        .result-rate { font-size: 0.82rem; opacity: 0.85; margin-top: 4px; }

        .exchange-btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--gradient-1); color: white; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; transition: opacity 0.3s; margin-top: 8px;
        }
        .exchange-btn:hover { opacity: 0.9; }

        /* RATES PANEL */
        .rate-card {
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 14px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid transparent; transition: all 0.3s;
        }
        .rate-card:hover { background: rgba(99,102,241,0.15); transform: translateX(4px); border-color: rgba(99,102,241,0.3); }
        .rate-left { display: flex; align-items: center; gap: 12px; }
        .rate-icon {
            width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: bold; font-size: 1rem;
        }
        .icon-btc  { background: linear-gradient(135deg,#f7931a,#e08010); }
        .icon-eth  { background: linear-gradient(135deg,#627eea,#4a6de5); }
        .icon-usdt { background: linear-gradient(135deg,#26a17b,#1c8060); }
        .icon-ton  { background: linear-gradient(135deg,#0088cc,#006fa8); }
        .icon-trx  { background: linear-gradient(135deg,#ff060a,#d00408); }
        .icon-doge { background: linear-gradient(135deg,#c2a633,#a8902a); }
        .icon-usdc { background: linear-gradient(135deg,#2775ca,#1f5fa8); }
        .icon-uzs  { background: linear-gradient(135deg,#1eb53a,#179a30); }
        .icon-usd  { background: linear-gradient(135deg,#85bb65,#6da350); }
        .icon-rub  { background: linear-gradient(135deg,#0033a0,#002880); }
        .rate-name { font-weight: 700; font-size: 1rem; }
        .rate-sub  { font-size: 0.75rem; color: var(--text-secondary); }
        .rate-value { text-align: right; }
        .rate-price { font-weight: 700; font-size: 1rem; color: var(--success); }
        .rate-label { font-size: 0.7rem; color: var(--text-secondary); }

        /* MODALS */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.82); backdrop-filter: blur(6px);
            z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        .overlay.open { display: flex; }
        .modal {
            background: var(--bg-card); border-radius: 22px; padding: 28px;
            width: 100%; max-width: 540px; max-height: 92vh; overflow-y: auto;
            border: 1px solid rgba(99,102,241,0.25);
        }
        .modal h3 { font-size: 1.2rem; margin-bottom: 18px; }
        .detail-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 11px 0; border-bottom: 1px solid rgba(255,255,255,0.07);
            gap: 10px; flex-wrap: wrap;
        }
        .detail-label { color: var(--text-secondary); font-size: 0.88rem; flex-shrink: 0; }
        .detail-value { font-weight: 600; text-align: right; word-break: break-all; }
        .copy-btn {
            background: rgba(99,102,241,0.2); border: none; color: var(--primary);
            padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.78rem; margin-left: 6px;
        }
        .copy-btn:hover { background: var(--primary); color: white; }

        /* TIMER */
        .timer-box {
            text-align: center; margin: 18px 0;
            background: rgba(245,158,11,0.1); border-radius: 14px; padding: 16px;
            border: 1px solid rgba(245,158,11,0.3);
        }
        .timer-label { font-size: 0.82rem; color: var(--text-secondary); margin-bottom: 4px; }
        .timer-display { font-size: 2.4rem; font-family: monospace; font-weight: 700; color: var(--warning); }
        .timer-display.urgent { color: var(--danger); }

        /* UPLOAD */
        .upload-area {
            border: 2px dashed rgba(99,102,241,0.4); border-radius: 12px; padding: 22px;
            text-align: center; cursor: pointer; margin: 16px 0;
            transition: all 0.3s; color: var(--text-secondary);
        }
        .upload-area:hover { border-color: var(--primary); background: rgba(99,102,241,0.08); }
        .upload-area.has-file { border-color: var(--success); background: rgba(16,185,129,0.08); color: var(--success); }

        .contact-box {
            background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.3);
            border-radius: 12px; padding: 14px; margin-top: 14px; font-size: 0.9rem;
        }
        .contact-box h4 { margin-bottom: 8px; font-size: 0.95rem; }

        .modal-actions { display: flex; gap: 12px; margin-top: 18px; }
        .btn { padding: 12px 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.95rem; transition: all 0.3s; flex: 1; }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger  { background: var(--danger);  color: white; }
        .btn-danger:hover  { background: #dc2626; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-gray    { background: var(--bg-light); color: var(--text-primary); }

        /* HISTORY MODAL */
        .history-modal { max-width: 660px; }
        .h-tabs { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; }
        .h-tab {
            flex: 1; text-align: center; padding: 11px;
            background: rgba(255,255,255,0.05); border-radius: 12px;
            cursor: pointer; font-weight: 600; font-size: 0.88rem;
            border: 2px solid transparent; transition: all 0.3s;
        }
        .h-tab.active { background: var(--primary); border-color: var(--primary); color: white; }

        /* HISTORY ITEMS */
        .h-item {
            background: rgba(255,255,255,0.05); border-radius: 14px;
            padding: 16px; margin-bottom: 12px;
            border-left: 4px solid transparent; transition: all 0.3s; cursor: pointer;
        }
        .h-item:hover { background: rgba(99,102,241,0.12); transform: translateX(3px); }
        .h-item.pending  { border-left-color: var(--warning); }
        .h-item.paid     { border-left-color: var(--primary); }
        .h-item.sent     { border-left-color: var(--success); }
        .h-item.rejected { border-left-color: var(--danger); }
        .h-item.cancelled{ border-left-color: var(--danger); }

        .h-item-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .h-item-id { font-weight: 700; color: var(--primary); font-family: monospace; font-size: 0.9rem; }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 700;
        }
        .badge-pending  { background: rgba(245,158,11,0.2);  color: var(--warning); }
        .badge-paid     { background: rgba(99,102,241,0.2);  color: var(--primary); }
        .badge-sent     { background: rgba(16,185,129,0.2);  color: var(--success); }
        .badge-rejected { background: rgba(239,68,68,0.2);   color: var(--danger);  }
        .badge-cancelled{ background: rgba(239,68,68,0.2);   color: var(--danger);  }

        .h-item-amounts { font-size: 0.95rem; }
        .h-item-arrow { color: var(--text-secondary); }
        .h-item-date { font-size: 0.78rem; color: var(--text-secondary); margin-top: 6px; }
        .h-item-note { font-size: 0.83rem; margin-top: 6px; font-weight: 600; }
        .h-item-enter { font-size: 0.78rem; color: var(--primary); margin-top: 4px; }

        /* TRANSACTION DETAIL inside history */
        .tx-detail { display: none; }
        .tx-detail.open { display: block; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
        .tx-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 0.88rem; }
        .tx-row-label { color: var(--text-secondary); }
        .tx-row-val { font-weight: 600; word-break: break-all; text-align: right; max-width: 60%; }

        /* STATUS BOX */
        .status-box {
            border-radius: 12px; padding: 14px; margin-top: 12px; font-size: 0.88rem;
        }
        .status-box.waiting  { background: rgba(99,102,241,0.1);  border: 1px solid rgba(99,102,241,0.3); }
        .status-box.success  { background: rgba(16,185,129,0.1);  border: 1px solid rgba(16,185,129,0.3); }
        .status-box.error    { background: rgba(239,68,68,0.1);   border: 1px solid rgba(239,68,68,0.3); }
        .status-box.pending  { background: rgba(245,158,11,0.1);  border: 1px solid rgba(245,158,11,0.3); }

        .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 0.95rem; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 28px; right: 28px;
            background: var(--bg-card); border-radius: 12px;
            padding: 14px 22px; transform: translateX(420px);
            transition: all 0.35s; z-index: 3000; border-left: 4px solid var(--success);
            box-shadow: var(--shadow); max-width: 320px;
        }
        .toast.show { transform: translateX(0); }
        .toast.err  { border-left-color: var(--danger); }
        .toast.warn { border-left-color: var(--warning); }
    </style>
</head>
<body>

<!-- TICKER -->
<div class="ticker-container">

<div class="container">

<div class="toast" id="toast"></div>

<script type="module">
// ─── FIREBASE CONFIG ───────────────────────────────────────────────────────────
// ⚠️  O'zingizning Firebase config'ingizni shu yerga qo'ying!
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getDatabase, ref, push, onValue, update, get }
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

const firebaseConfig = {
    apiKey:            "AIzaSyC5JMD4_rmYSLbFFYwKY3D6EZYxWtpfi0k",
    authDomain:        "cryptoexchangepro110921.firebaseapp.com",
    databaseURL:       "https://cryptoexchangepro110921-default-rtdb.firebaseio.com",
    projectId:         "cryptoexchangepro110921",
    storageBucket:     "cryptoexchangepro110921.firebasestorage.app",
    messagingSenderId: "848073389707",
    appId:             "1:848073389707:web:d3c40dbd3f88766d7a068e"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ─── GITHUB JSON URL'LAR ───────────────────────────────────────────────────────
const RATES_URL    = 'https://balenciaga110921-creator.github.io/meningsaytim/rates.json';
const WALLETS_URL  = 'https://balenciaga110921-creator.github.io/meningsaytim/wallets.json';
const CONTACTS_URL = 'https://balenciaga110921-creator.github.io/meningsaytim/contacts.json';

// ─── STATE ─────────────────────────────────────────────────────────────────────
let rates = {}, wallets = {}, contacts = {};
let curOrder = null;
let payTimer = null, waitTimer = null;
let historyTab = 'active';
let expandedTx = null; // kengaytirilgan tranzaksiya ID

const CURRENCY_ICONS  = { BTC:'₿', ETH:'Ξ', USDT:'₮', TON:'🌐', TRX:'📱', DOGE:'🐕', USDC:'💰', UZS:'🇺🇿', USD:'🇺🇸', RUB:'🇷🇺' };
const CURRENCY_NAMES  = { BTC:'Bitcoin', ETH:'Ethereum', USDT:'Tether', TON:'TON', TRX:'Tron', DOGE:'Dogecoin', USDC:'USD Coin', UZS:"So'm", USD:'Dollar', RUB:'Rubl' };
const ALL_CURR = ['BTC','ETH','USDT','TON','TRX','DOGE','USDC','UZS','USD','RUB'];

// Client UID (localStorage)
let clientId = localStorage.getItem('cex_cid');
if (!clientId) {
    clientId = 'CLI_' + Date.now() + '_' + Math.random().toString(36).slice(2,9);
    localStorage.setItem('cex_cid', clientId);
}

// ─── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type='') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── FORMAT NUMBERS ────────────────────────────────────────────────────────────
// rates.json ichida: 1 UZS = X kripto  yoki  1 UZS = Y so'm (UZS uchun 1)
// Lekin kurslarni ko'rsatganda: 1 ta kripto = necha UZS
function fmtPrice(curr) {
    const r = parseFloat(rates[curr]);
    if (!r || r === 0) return '—';
    if (curr === 'UZS') return formatUZS(1);
    // 1 kripto = 1/r UZS
    const uzs = 1 / r;
    return formatUZS(uzs);
}

function formatUZS(n) {
    if (n >= 1000) return n.toLocaleString('uz-UZ', { maximumFractionDigits: 0 }) + " so'm";
    return n.toLocaleString('uz-UZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " so'm";
}

function fmtCrypto(n, curr) {
    if (['UZS','USD','RUB'].includes(curr)) return n.toLocaleString('uz-UZ', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (['BTC','ETH'].includes(curr)) return n.toFixed(8);
    return n.toFixed(6);
}

// ─── LOAD DATA ─────────────────────────────────────────────────────────────────
async function loadData() {
    try {
        const [rRes, wRes, cRes] = await Promise.all([
            fetch(RATES_URL  + '?t=' + Date.now()),
            fetch(WALLETS_URL + '?t=' + Date.now()),
            fetch(CONTACTS_URL + '?t=' + Date.now()),
        ]);
        rates   = await rRes.json();
        wallets = await wRes.json();
        contacts= await cRes.json();

        renderTicker();
        renderRates();
        calc();
    } catch(e) {
        console.error(e);
        toast('⚠️ Internet yoki GitHub Pages muammosi', 'err');
    }
}

// ─── TICKER ────────────────────────────────────────────────────────────────────
function renderTicker() {
    const wrap = document.getElementById('tickerWrap');
    let html = '';
    ALL_CURR.forEach(c => {
        if (rates[c] === undefined) return;
        if (c === 'UZS') return; // UZS ni tickerda skip
        const priceUZS = 1 / parseFloat(rates[c]);
        html += `<div class="ticker-item"><span class="ticker-coin">${CURRENCY_ICONS[c]} ${c}</span> <span style="color:var(--text-secondary)">1 ${c} =</span> <span class="ticker-price">${Math.round(priceUZS).toLocaleString('uz-UZ')} so'm</span></div>`;
    });
    wrap.innerHTML = html + html; // loop uchun ikki marta
}

// ─── RATES LIST ────────────────────────────────────────────────────────────────
function renderRates() {
    const el = document.getElementById('ratesList');
    let html = '';
    ALL_CURR.forEach(c => {
        if (rates[c] === undefined) return;
        if (c === 'UZS') return;
        const priceUZS = 1 / parseFloat(rates[c]);
        const disp = Math.round(priceUZS).toLocaleString('uz-UZ') + " so'm";
        html += `
        <div class="rate-card">
            <div class="rate-left">
                <div class="rate-icon icon-${c.toLowerCase()}">${CURRENCY_ICONS[c]}</div>
                <div>
                    <div class="rate-name">${c}</div>
                    <div class="rate-sub">${CURRENCY_NAMES[c]}</div>
                </div>
            </div>
            <div class="rate-value">
                <div class="rate-price">${disp}</div>
                <div class="rate-label">1 ${c} uchun</div>
            </div>
        </div>`;
    });
    el.innerHTML = html || '<div class="empty-msg">📭 Kurslar topilmadi</div>';
}

// ─── CALCULATION ───────────────────────────────────────────────────────────────
function calc() {
    const gc = document.getElementById('giveCurr').value;
    const rc = document.getElementById('getCurr').value;
    const ga = parseFloat(document.getElementById('giveAmt').value) || 0;
    document.getElementById('giveSym').textContent = gc;

    if (!rates[gc] || !rates[rc]) {
        document.getElementById('resultAmt').textContent = '—';
        document.getElementById('resultRate').textContent = 'Kurs yuklanmadi';
        return;
    }

    // rates[X] = 1 UZS nechta X
    // Ga -> UZS -> Ra
    const gaInUZS = ga / parseFloat(rates[gc]);  // giveAmount → UZS
    const fee = 0.005;
    const getAmt = gaInUZS * parseFloat(rates[rc]) * (1 - fee);

    const rateDisplay = (parseFloat(rates[rc]) / parseFloat(rates[gc])).toFixed(6);

    document.getElementById('resultAmt').textContent = fmtCrypto(getAmt, rc) + ' ' + rc;
    document.getElementById('resultRate').textContent = `1 ${gc} = ${rateDisplay} ${rc}  (komissiya 0.5%)`;
}

window.calc = calc;

function swapCurr() {
    const g = document.getElementById('giveCurr').value;
    const r = document.getElementById('getCurr').value;
    document.getElementById('giveCurr').value = r;
    document.getElementById('getCurr').value  = g;
    calc();
}
window.swapCurr = swapCurr;

// ─── EXCHANGE START ────────────────────────────────────────────────────────────
function startExchange() {
    const gc   = document.getElementById('giveCurr').value;
    const rc   = document.getElementById('getCurr').value;
    const ga   = parseFloat(document.getElementById('giveAmt').value);
    const uw   = document.getElementById('userWallet').value.trim();

    if (!ga || ga <= 0)    { toast('❌ Miqdorni kiriting', 'err'); return; }
    if (!uw)               { toast('❌ Hamyoningizni kiriting', 'err'); return; }
    if (!rates[gc] || !rates[rc]) { toast('❌ Kurslar yuklanmadi, qayta urinib ko\'ring', 'err'); return; }

    const gaInUZS = ga / parseFloat(rates[gc]);
    const getAmt  = gaInUZS * parseFloat(rates[rc]) * 0.995;
    const rWallet = wallets[gc] || '';

    const txId = 'TX' + Date.now() + '_' + Math.random().toString(36).slice(2,8).toUpperCase();

    curOrder = {
        id: txId,
        clientId,
        giveCurr: gc, getCurr: rc,
        giveAmt: ga, getAmt,
        userWallet: uw,
        receiverWallet: rWallet,
        status: 'pending',
        createdAt: new Date().toISOString(),
        receiptData: null,
    };

    showPaymentModal();
}
window.startExchange = startExchange;

// ─── PAYMENT MODAL ────────────────────────────────────────────────────────────
function showPaymentModal() {
    const body    = document.getElementById('paymentBody');
    const actions = document.getElementById('paymentActions');
    const rw      = curOrder.receiverWallet || '⚠️ Hamyon topilmadi';

    body.innerHTML = `
        <div class="detail-row"><span class="detail-label">📋 Zakaz ID</span><span class="detail-value">${curOrder.id} <button class="copy-btn" onclick="cp('${curOrder.id}')">Nusxa</button></span></div>
        <div class="detail-row"><span class="detail-label">💰 Siz yuborasiz</span><span class="detail-value">${curOrder.giveAmt} ${curOrder.giveCurr}</span></div>
        <div class="detail-row"><span class="detail-label">💎 Siz olasiz</span><span class="detail-value">${fmtCrypto(curOrder.getAmt, curOrder.getCurr)} ${curOrder.getCurr}</span></div>
        <div class="detail-row"><span class="detail-label">🏦 Bizning hamyon</span><span class="detail-value">${rw} <button class="copy-btn" onclick="cp('${rw}')">Nusxa</button></span></div>
        <div class="timer-box">
            <div class="timer-label">⏳ To'lov qilish uchun qolgan vaqt:</div>
            <div class="timer-display" id="payTimerDisp">15:00</div>
        </div>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('rFile').click()">
            📁 Kvitansiyani yuklang (PDF / JPG / PNG)
            <input type="file" id="rFile" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFile(this)">
        </div>
        <div id="fileStatus"></div>
        <p style="color:var(--warning);font-size:0.82rem;margin-top:8px;">⚠️ 15 daqiqa ichida to'lov kvitansiyasini yubormasa, zakaz avtomatik bekor qilinadi.</p>
    `;

    actions.innerHTML = `
        <button class="btn btn-success" onclick="confirmPay()">✅ To'lov qildim</button>
        <button class="btn btn-danger"  onclick="cancelOrder()">❌ Bekor qilish</button>
    `;

    document.getElementById('paymentOverlay').classList.add('open');
    startCountdown('payTimerDisp', 900, onPayTimerEnd);
}

function onPayTimerEnd() {
    if (curOrder && curOrder.status === 'pending') {
        curOrder.status = 'cancelled';
        curOrder.cancelledAt = new Date().toISOString();
        saveToDB(curOrder).then(() => {
            closePayment();
            toast('⏰ Vaqt tugadi! Zakaz bekor qilindi', 'warn');
        });
    }
}

function handleFile(inp) {
    const file = inp.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) { toast('❌ Fayl 10MB dan katta bo\'lmasin', 'err'); return; }
    const reader = new FileReader();
    reader.onload = e => {
        curOrder.receiptData = e.target.result;
        curOrder.receiptName = file.name;
        document.getElementById('uploadArea').classList.add('has-file');
        document.getElementById('uploadArea').innerHTML = `✅ ${file.name} yuklandi<input type="file" id="rFile" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleFile(this)">`;
        document.getElementById('fileStatus').innerHTML = '';
    };
    reader.readAsDataURL(file);
}
window.handleFile = handleFile;

function confirmPay() {
    if (!curOrder.receiptData) { toast('❌ Avval kvitansiyani yuklang', 'err'); return; }
    stopTimer();
    curOrder.status   = 'paid';
    curOrder.paidAt   = new Date().toISOString();

    saveToDB(curOrder).then(key => {
        curOrder._fbKey = key;
        closePayment();
        showWaitingModal();
        listenOrder(key);
        toast('✅ To\'lovingiz qabul qilindi! Admin tekshirmoqda...', '');
    }).catch(() => toast('❌ Xatolik yuz berdi, internet tekshiring', 'err'));
}
window.confirmPay = confirmPay;

function cancelOrder() {
    stopTimer();
    if (curOrder) {
        curOrder.status = 'cancelled';
        curOrder.cancelledAt = new Date().toISOString();
        saveToDB(curOrder).then(() => toast('Zakaz bekor qilindi', 'warn'));
    }
    closePayment();
}
window.cancelOrder = cancelOrder;

function closePayment() {
    stopTimer();
    document.getElementById('paymentOverlay').classList.remove('open');
}

// ─── WAITING MODAL ─────────────────────────────────────────────────────────────
function showWaitingModal() {
    document.getElementById('waitingBody').innerHTML = `
        <div class="detail-row"><span class="detail-label">📋 Zakaz ID</span><span class="detail-value">${curOrder.id}</span></div>
        <div class="detail-row"><span class="detail-label">💰 Yuborilgan</span><span class="detail-value">${curOrder.giveAmt} ${curOrder.giveCurr}</span></div>
        <div class="detail-row"><span class="detail-label">💎 Kutilayotgan</span><span class="detail-value">${fmtCrypto(curOrder.getAmt, curOrder.getCurr)} ${curOrder.getCurr}</span></div>
        <div class="timer-box">
            <div class="timer-label">⏳ Admin tasdiqlovini kutish vaqti:</div>
            <div class="timer-display" id="waitTimerDisp">15:00</div>
        </div>
        <div id="orderStatusMsg" class="status-box waiting" style="margin-top:14px;">
            ⏳ Admin tekshirmoqda, biroz kuting...
        </div>
        <div class="contact-box">
            <h4>📞 Agar muammo bo'lsa:</h4>
            <div>📞 ${contacts.phone || '-'}</div>
            <div>📱 Telegram: ${contacts.telegram || '-'}</div>
            <div>📧 ${contacts.email || '-'}</div>
        </div>
    `;
    document.getElementById('waitingOverlay').classList.add('open');
    startCountdown('waitTimerDisp', 900, () => {});
}

function updateWaitingStatus(status) {
    const el = document.getElementById('orderStatusMsg');
    if (!el) return;
    if (status === 'sent') {
        stopWaitTimer();
        el.className = 'status-box success';
        el.innerHTML = '🎉 Aktivlaringiz yuborildi! Hamyoningizni tekshiring.';
        toast('✅ Aktivlaringiz yuborildi!', '');
    } else if (status === 'rejected') {
        stopWaitTimer();
        el.className = 'status-box error';
        el.innerHTML = '❌ Admin tomonidan rad etildi. Qo\'llab-quvvatlash bilan bog\'laning.';
        toast('❌ Zakaz rad etildi', 'err');
    }
}

function closeWaiting() {
    stopWaitTimer();
    document.getElementById('waitingOverlay').classList.remove('open');
}
window.closeWaiting = closeWaiting;

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
async function saveToDB(order) {
    // receiptData juda katta, uni alohida saqlaymiz yoki limitlaymiz
    const payload = { ...order };
    // receiptData ni bazaga yukladanik (max ~8MB, Firebase 10MB limit)
    const ordersRef = ref(db, 'orders');
    const snap = await push(ordersRef, payload);
    return snap.key;
}

function listenOrder(key) {
    const oRef = ref(db, 'orders/' + key);
    onValue(oRef, snap => {
        if (!snap.exists()) return;
        const d = snap.val();
        updateWaitingStatus(d.status);
        renderHistoryList(); // yangilash
    });
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function openHistory() {
    renderHistoryList();
    document.getElementById('historyOverlay').classList.add('open');
}
window.openHistory = openHistory;

function closeHistory() {
    document.getElementById('historyOverlay').classList.remove('open');
}
window.closeHistory = closeHistory;

function switchTab(t) {
    historyTab = t;
    document.querySelectorAll('.h-tab').forEach(el => {
        el.classList.toggle('active', el.dataset.t === t);
    });
    renderHistoryList();
}
window.switchTab = switchTab;

async function renderHistoryList() {
    const el = document.getElementById('historyBody');
    if (!el) return;
    el.innerHTML = '<div class="empty-msg">⏳ Yuklanmoqda...</div>';

    try {
        const snap = await get(ref(db, 'orders'));
        if (!snap.exists()) { el.innerHTML = '<div class="empty-msg">📭 Zakazlar yo\'q</div>'; return; }

        const all = [];
        snap.forEach(ch => { all.push({ _key: ch.key, ...ch.val() }); });

        // Faqat bu clientId ga tegishlilar
        const mine = all.filter(o => o.clientId === clientId);

        let filtered = [];
        if (historyTab === 'active') {
            filtered = mine.filter(o => o.status === 'pending' || o.status === 'paid');
        } else if (historyTab === 'done') {
            filtered = mine.filter(o => o.status === 'sent');
        } else {
            filtered = mine.filter(o => o.status === 'rejected' || o.status === 'cancelled');
        }

        if (filtered.length === 0) {
            el.innerHTML = '<div class="empty-msg">📭 Bu bo\'limda zakazlar yo\'q</div>';
            return;
        }

        // Yangilar birinchi
        filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

        el.innerHTML = filtered.map(o => buildHistoryItem(o)).join('');
    } catch(e) {
        console.error(e);
        el.innerHTML = '<div class="empty-msg">⚠️ Ma\'lumot yuklanmadi</div>';
    }
}

function buildHistoryItem(o) {
    const isExpanded = expandedTx === o._key;

    const statusMap = {
        pending:   { badge: 'badge-pending',  text: '⏳ To\'lov kutilmoqda' },
        paid:      { badge: 'badge-paid',     text: '🔍 Tekshirilmoqda'    },
        sent:      { badge: 'badge-sent',     text: '✅ Tugatilgan'         },
        rejected:  { badge: 'badge-rejected', text: '❌ Rad etildi'         },
        cancelled: { badge: 'badge-cancelled',text: '🚫 Bekor qilingan'    },
    };
    const st = statusMap[o.status] || { badge:'', text: o.status };

    const noteMap = {
        pending:   '<div class="h-item-note" style="color:var(--warning)">⏳ To\'lov amalga oshirish kutilmoqda</div>',
        paid:      '<div class="h-item-note" style="color:var(--primary)">🔍 Admin tekshirmoqda, kuting...</div>',
        sent:      '<div class="h-item-note" style="color:var(--success)">🎉 Aktivlar hamyoningizga yuborildi!</div>',
        rejected:  '<div class="h-item-note" style="color:var(--danger)">❌ Admin rad etdi. Qo\'llab-quvvatlash bilan bog\'laning.</div>',
        cancelled: '<div class="h-item-note" style="color:var(--danger)">🚫 Zakaz bekor qilingan.</div>',
    };

    // Ichki detail (ochilganda ko'rinadi)
    const detailHtml = isExpanded ? `
        <div class="tx-detail open">
            <div class="tx-row"><span class="tx-row-label">📋 Zakaz ID</span><span class="tx-row-val">${o.id}</span></div>
            <div class="tx-row"><span class="tx-row-label">💰 Siz yuborgan</span><span class="tx-row-val">${o.giveAmt} ${o.giveCurr}</span></div>
            <div class="tx-row"><span class="tx-row-label">💎 Siz olgan/olayotgan</span><span class="tx-row-val">${fmtCrypto(o.getAmt, o.getCurr)} ${o.getCurr}</span></div>
            <div class="tx-row"><span class="tx-row-label">👛 Sizning hamyon</span><span class="tx-row-val">${o.userWallet || '—'}</span></div>
            <div class="tx-row"><span class="tx-row-label">🏦 Bizning hamyon</span><span class="tx-row-val">${o.receiverWallet || '—'}</span></div>
            <div class="tx-row"><span class="tx-row-label">📅 Yaratilgan</span><span class="tx-row-val">${new Date(o.createdAt).toLocaleString('uz-UZ')}</span></div>
            ${o.paidAt    ? `<div class="tx-row"><span class="tx-row-label">💳 To'langan</span><span class="tx-row-val">${new Date(o.paidAt).toLocaleString('uz-UZ')}</span></div>` : ''}
            ${o.sentAt    ? `<div class="tx-row"><span class="tx-row-label">💸 Yuborilgan</span><span class="tx-row-val">${new Date(o.sentAt).toLocaleString('uz-UZ')}</span></div>` : ''}
            ${o.rejectedAt? `<div class="tx-row"><span class="tx-row-label">❌ Rad etilgan</span><span class="tx-row-val">${new Date(o.rejectedAt).toLocaleString('uz-UZ')}</span></div>` : ''}
            ${o.cancelledAt?`<div class="tx-row"><span class="tx-row-label">🚫 Bekor qilingan</span><span class="tx-row-val">${new Date(o.cancelledAt).toLocaleString('uz-UZ')}</span></div>` : ''}
        </div>
    ` : `<div class="tx-detail"></div>`;

    const arrow = isExpanded ? '▲' : '▼';

    return `
    <div class="h-item ${o.status}" onclick="toggleTxDetail('${o._key}')">
        <div class="h-item-top">
            <span class="h-item-id">${o.id}</span>
            <span class="badge ${st.badge}">${st.text}</span>
        </div>
        <div class="h-item-amounts">
            ${CURRENCY_ICONS[o.giveCurr] || ''} ${o.giveAmt} ${o.giveCurr}
            <span class="h-item-arrow"> → </span>
            ${CURRENCY_ICONS[o.getCurr] || ''} ${fmtCrypto(o.getAmt, o.getCurr)} ${o.getCurr}
        </div>
        ${noteMap[o.status] || ''}
        <div class="h-item-date">📅 ${new Date(o.createdAt).toLocaleString('uz-UZ')}</div>
        <div class="h-item-enter" style="text-align:right;margin-top:4px;">${arrow} Tafsilotlar</div>
        ${detailHtml}
    </div>`;
}

function toggleTxDetail(key) {
    expandedTx = expandedTx === key ? null : key;
    renderHistoryList();
}
window.toggleTxDetail = toggleTxDetail;

// ─── TIMER ─────────────────────────────────────────────────────────────────────
let payTimerInterval = null, waitTimerInterval = null;

function startCountdown(dispId, seconds, onEnd) {
    let rem = seconds;
    const update = () => {
        const el = document.getElementById(dispId);
        if (!el) return;
        const m = Math.floor(rem / 60);
        const s = rem % 60;
        el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (rem <= 60) el.classList.add('urgent');
        if (rem <= 0) { clearInterval(timerRef); onEnd(); return; }
        rem--;
    };
    const timerRef = setInterval(update, 1000);
    update();
    if (dispId === 'payTimerDisp')  payTimerInterval  = timerRef;
    else                            waitTimerInterval = timerRef;
}

function stopTimer()     { if (payTimerInterval)  clearInterval(payTimerInterval); }
function stopWaitTimer() { if (waitTimerInterval) clearInterval(waitTimerInterval); }

// ─── CLIPBOARD ─────────────────────────────────────────────────────────────────
function cp(text) {
    navigator.clipboard.writeText(text).then(() => toast('📋 Nusxa olindi'));
}
window.cp = cp;

// ─── AUTO REFRESH ──────────────────────────────────────────────────────────────
setInterval(loadData, 60000);
loadData();
</script>
